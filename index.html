<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Tinsur Note</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <!-- 设置浏览器图标 -->
    <link rel="icon" href="https://note.tinsur.cn/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="https://note.tinsur.cn/favicon.ico" type="image/x-icon" />
    <!-- 文档主题 -->
    <link rel="stylesheet" href="https://note.tinsur.cn/css/vue.css">
</head>

<body>
    <!-- 加载时的动作 -->
    <div id="app">加载中，请耐心等待一下...</div>
    <script>
        window.$docsify = {
            // 项目名称
            name: 'Tinsur Note',
            // Github仓库地址
            repo: 'https://github.com/Tinsur2005/Study-Note',
            // 侧边栏支持，固定读取网站根目录文件
            loadSidebar: '_sidebar.md',
            // 导航栏支持，固定读取网站根目录文件
            loadNavbar: '_navbar.md',
            // 封面支持
            coverpage: false,
            // 最大支持渲染的标题层级
            maxLevel: 5,
            // 自定义侧边栏后默认不会再生成目录，设置生成目录的最大层级
            subMaxLevel: 4,
            // 小屏设备下合并导航栏到侧边栏
            mergeNavbar: true,
            auto2top: true, // 路由切换自动滚动到页面顶部

            // ========== 新增核心配置：路由别名，解决子目录404 ==========
            alias: {
                '/.*/_sidebar.md': '/_sidebar.md',
                '/.*/_navbar.md': '/_navbar.md'
            },

            search: {
                maxAge: 86400000,// 过期时间，单位毫秒，默认一天
                paths: 'auto',
                placeholder: {
                    '/zh-cn/': '在此处搜索',
                    '/': '在此处搜索'
                },
                noData: '找不到结果',
                depth: 4,
                hideOtherSidebarContent: false,
                namespace: 'Docsify-Guide',
            }
        };

        // 注册插件，放在配置下方更规范
        window.$docsify.plugins = [
            function (hook) {
                hook.doneEach(() => addIcpFooter());
            }
        ];
    </script>
    <!-- docsify的js依赖 -->
    <script src="https://note.tinsur.cn/js/docsify.min.js"></script>
    <!-- emoji表情支持 -->
    <script src="https://note.tinsur.cn/js/emoji.min.js"></script>
    <!-- 图片放大缩小支持 -->
    <script src="https://note.tinsur.cn/js/zoom-image.min.js"></script>
    <!-- 搜索功能支持 -->
    <script src="https://note.tinsur.cn/js/search.min.js"></script>
    <!--代码复制按钮-->
    <script src="https://note.tinsur.cn/js/docsify-copy-code.min.js"></script>


    <!-- 备案号展示 -->
    <script>
        // JS动态注入hover样式
        (function () {
            const style = document.createElement('style');
            style.textContent = `
            #icp-footer a:hover {
              color: #42b983;
              text-decoration: underline;
            }
          `;
            document.head.appendChild(style);
        })();

        function addIcpFooter() {
            if (document.querySelector('#icp-footer')) return;
            const footer = document.createElement('div');
            footer.id = 'icp-footer';
            footer.style = 'margin-top: 100px; padding-top: 20px; padding-bottom: 40px; border-top: 1px solid #eee; text-align: center; font-size:14px;';
            footer.innerHTML = `
            <a href="https://beian.miit.gov.cn/" target="_blank" style="color:#666;text-decoration:none;">鲁ICP备2023032291号-1</a>
            &nbsp;|&nbsp;
            <a href="http://www.beian.gov.cn/portal/registerSystemInfo?recordcode=37021402000083" target="_blank" style="color:#666;text-decoration:none;">
                <img src="https://www.tinsur.cn/beian.png" style="height:14px;vertical-align:middle;margin-right:4px;">鲁公网安备37021402000083号
            </a>
        `;
            const contentBox = document.querySelector('.content');
            if (contentBox) contentBox.appendChild(footer);
        }
        addIcpFooter();
    </script>
    <!-- 备案号展示结束 -->

    <!--解除中文编码问题-->
    <script>
        function fixSearchResult() {
            document.querySelectorAll('.search-result li').forEach(item => {
                let txt = item.innerText.trim();
                // 清理抓取到的index.html源码垃圾项
                if (txt.includes('<!DOCTYPE') || txt.includes('<html')) {
                    item.remove();
                    return;
                }
                // 判断是否包含URL百分号编码字符，尝试解码
                if (/%[0-9A-Fa-f]{2}/.test(txt)) {
                    try {
                        const decoded = decodeURIComponent(txt);
                        if (decoded !== txt) item.innerText = decoded;
                    } catch (err) { }
                }
            })
        }
        // 持续监听搜索列表变化
        setInterval(fixSearchResult, 350);
    </script>
    <!--解除中文编码问题 结束-->

</body>

</html>
